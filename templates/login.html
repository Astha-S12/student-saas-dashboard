<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0b0f19;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            color: #e5e7eb;
        }

        .login-box {
            width: 100%;
            max-width: 420px;
            background: #111827;
            border: 1px solid #1f2a44;
            border-radius: 14px;
            padding: 35px;
            box-shadow: 0 0 30px rgba(0, 140, 255, 0.12);
        }

        .title {
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 25px;
        }

        .form-control {
            background: #0f172a;
            border: 1px solid #1f2a44;
            color: #fff;
        }

        .form-control:focus {
            background: #0f172a;
            color: #fff;
            border-color: #3b82f6;
            box-shadow: none;
        }

        .btn-login {
            width: 100%;
            background: #3b82f6;
            border: none;
            padding: 10px;
            font-weight: bold;
            border-radius: 8px;
            margin-top: 10px;
            transition: 0.2s;
        }

        .btn-login:hover {
            background: #2563eb;
        }

        .footer-text {
            text-align: center;
            font-size: 12px;
            color: #64748b;
            margin-top: 15px;
        }

        .glow {
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>

<body>

<div class="login-box">

    {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }} text-center py-2">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}

    <div class="title glow">Admin Login</div>
    <div class="subtitle">Student Management Dashboard</div>

    <!-- ✅ ERROR MESSAGE (INSIDE BOX) -->
    {% if error %}
    <div class="alert alert-danger text-center py-2">
        {{ error }}
    </div>
    {% endif %}

    <!-- ✅ SINGLE LOGIN FORM ONLY -->
    <form method="POST">

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Enter username" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>

        <button type="submit" class="btn btn-login">
            Login
        </button>

    </form>

    <div class="footer-text">
        Secure access only • Flask Dashboard
    </div>

</div>

</body>
</html>
